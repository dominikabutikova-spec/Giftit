<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Новая жизнь</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .register-card { background: white; border-radius: 30px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #064e3b; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #065f46; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #d1fae5; border-radius: 30px; font-size: 16px; outline: none; }
        .form-group input:focus { border-color: #059669; }
        .btn { width: 100%; padding: 14px; background: #059669; color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #047857; }
        .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .success { background: #d1fae5; color: #059669; padding: 12px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #059669; text-decoration: none; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: #10b981; color: white; border-radius: 10px; display: none; z-index: 1000; }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>
    <div class="register-card">
        <h1>📝 Регистрация</h1>
        <div id="errorMessage" class="error" style="display: none;"></div>
        <div id="successMessage" class="success" style="display: none;"></div>
        <form id="registerForm">
            <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Имя *</label><input type="text" id="firstName" required></div>
            <div class="form-group"><label>Фамилия *</label><input type="text" id="lastName" required></div>
            <div class="form-group"><label>Телефон *</label><input type="tel" id="phone" placeholder="+7 937 123-45-67" required></div>
            <div class="form-group"><label>Пароль *</label><input type="password" id="password" required></div>
            <div class="form-group"><label>Повтор пароля *</label><input type="password" id="confirmPassword" required></div>
            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>
        <div class="links"><a href="login.html">Уже есть аккаунт? Войти</a></div>
        <a href="index.html" class="back-link">← На главную</a>
    </div>
    <script>
        function showNotification(msg) { const n = document.getElementById('notification'); n.textContent = msg; n.style.display = 'block'; setTimeout(() => n.style.display = 'none', 2000); }
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value, password = document.getElementById('password').value, confirm = document.getElementById('confirmPassword').value;
            const firstName = document.getElementById('firstName').value, lastName = document.getElementById('lastName').value, phone = document.getElementById('phone').value;
            const errorDiv = document.getElementById('errorMessage'), successDiv = document.getElementById('successMessage');
            errorDiv.style.display = 'none'; successDiv.style.display = 'none';
            if (!email || !firstName || !lastName || !phone || !password) { errorDiv.textContent = 'Все поля обязательны'; errorDiv.style.display = 'block'; return; }
            if (!email.includes('@')) { errorDiv.textContent = 'Неверный email'; errorDiv.style.display = 'block'; return; }
            if (password !== confirm) { errorDiv.textContent = 'Пароли не совпадают'; errorDiv.style.display = 'block'; return; }
            if (password.length < 6) { errorDiv.textContent = 'Пароль минимум 6 символов'; errorDiv.style.display = 'block'; return; }
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.some(u => u.email === email)) { errorDiv.textContent = 'Email уже зарегистрирован'; errorDiv.style.display = 'block'; return; }
            const newUser = { id: users.length + 1, email, password, firstName, lastName, phone, registeredAt: new Date().toISOString(), isModerator: false };
            users.push(newUser); localStorage.setItem('users', JSON.stringify(users));
            successDiv.textContent = '✅ Регистрация успешна!'; successDiv.style.display = 'block';
            showNotification('✅ Регистрация успешна!');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        });
    </script>
</body>
</html>
