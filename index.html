<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftGuru • заказы приходят продавцу</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #fdf5ed;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 20px 60px rgba(233, 107, 75, 0.1);
            min-height: 100vh;
        }
        .header {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #ffe4d5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .logo {
            font-weight: 700;
            font-size: 28px;
            background: linear-gradient(130deg, #b2452a, #e96b4b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i {
            color: #e96b4b;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 24px;
            color: #b2452a;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e96b4b;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-badge {
            background: #fceae3;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn {
            background: #b2452a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background: #e96b4b;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #b2452a;
            color: #b2452a;
        }
        .content {
            padding: 30px;
        }
        .quiz-section {
            background: #fef9f5;
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid #ffd9c9;
        }
        .quiz-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .progress-bar {
            height: 8px;
            background: #f0dcd0;
            border-radius: 20px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #e96b4b;
            transition: width 0.3s;
        }
        .quiz-question {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .quiz-options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        .quiz-option {
            background: white;
            border: 2px solid #ffd4c2;
            border-radius: 60px;
            padding: 15px 30px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .quiz-option.selected {
            background: #b2452a;
            border-color: #b2452a;
            color: white;
        }
        .quiz-nav {
            display: flex;
            gap: 15px;
        }
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-chip {
            background: #f0e3db;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .filter-chip.active {
            background: #b2452a;
            color: white;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: white;
            border-radius: 30px;
            padding: 20px;
            border: 1px solid #ffded0;
            transition: 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(233, 107, 75, 0.15);
        }
        .product-image {
            width: 100%;
            height: 200px;
            background: #fceae3;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 15px;
        }
        .product-title {
            font-weight: 700;
            font-size: 18px;
        }
        .product-price {
            font-weight: 800;
            font-size: 24px;
            color: #b2452a;
            margin: 10px 0;
        }
        .btn-add {
            width: 100%;
            background: #b2452a;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .cart-modal {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: right 0.3s;
            z-index: 1000;
            padding: 25px;
            overflow-y: auto;
        }
        .cart-modal.open {
            right: 0;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .cart-item {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #f0dcd0;
        }
        .cart-item-image {
            width: 60px;
            height: 60px;
            background: #fceae3;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-title {
            font-weight: 600;
        }
        .cart-item-price {
            color: #b2452a;
            font-weight: 700;
        }
        .cart-item-remove {
            color: #999;
            cursor: pointer;
        }
        .cart-total {
            font-size: 20px;
            font-weight: 700;
            margin: 20px 0;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 999;
        }
        .overlay.active {
            display: block;
        }
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 50px;
            z-index: 2000;
            display: none;
            max-width: 400px;
            width: 90%;
        }
        .modal.active {
            display: block;
        }
        .modal input {
            width: 100%;
            padding: 15px 20px;
            margin: 10px 0;
            border: 2px solid #ffd4c2;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
        }
        .modal input:focus {
            border-color: #b2452a;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Шапка -->
    <div class="header">
        <div class="logo">
            <i class="fas fa-gift"></i> GiftGuru
        </div>
        <div class="user-info">
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
            <div class="user-badge" onclick="showAuthModal()">
                <i class="fa-regular fa-user"></i> <span id="userName">Гость</span>
            </div>
        </div>
    </div>

    <div class="content">
        <!-- Тест -->
        <div class="quiz-section">
            <div class="quiz-title">🎯 Персональный подбор подарков</div>
            <div class="progress-bar">
                <div class="progress-fill" id="quizProgress" style="width: 0%"></div>
            </div>
            <div id="quizContainer"></div>
            <div class="quiz-nav">
                <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()" style="display: none;">Назад</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()">Начать</button>
            </div>
        </div>

        <!-- Каталог -->
        <div class="catalog-header">
            <h2>🎁 Рекомендуемые подарки</h2>
            <div class="filters">
                <span class="filter-chip active" onclick="filterProducts('all')">Все</span>
                <span class="filter-chip" onclick="filterProducts('до 2000')">до 2000₽</span>
                <span class="filter-chip" onclick="filterProducts('2000-5000')">2000-5000₽</span>
                <span class="filter-chip" onclick="filterProducts('5000+')">5000+₽</span>
            </div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Модалка авторизации (для имени клиента) -->
    <div class="overlay" id="authOverlay" onclick="hideAuthModal()"></div>
    <div class="modal" id="authModal">
        <span class="close" onclick="hideAuthModal()">&times;</span>
        <h3>Введите ваши данные</h3>
        <input type="text" id="userNameInput" placeholder="Ваше имя" value="Александр">
        <input type="email" id="userEmailInput" placeholder="Ваш email" value="client@mail.ru">
        <button class="btn" style="width: 100%;" onclick="saveUser()">Сохранить</button>
    </div>

    <!-- Корзина -->
    <div class="overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-modal" id="cartModal">
        <div class="cart-header">
            <h3>Корзина</h3>
            <i class="fas fa-times" style="cursor: pointer;" onclick="toggleCart()"></i>
        </div>
        <div id="cartItems"></div>
        <div class="cart-total" id="cartTotal">Итого: 0₽</div>
        <button class="btn" style="width: 100%;" onclick="checkout()">Оформить заказ</button>
    </div>
</div>

<script>
    // ==================== ТОВАРЫ ====================
    const products = [
        { id: 1, name: 'Умная фитнес-бутылка', price: 1900, category: 'Спорт', image: '🥤', tags: ['спорт'] },
        { id: 2, name: 'Набор для йоги', price: 3200, category: 'Спорт', image: '🧘', tags: ['спорт'] },
        { id: 3, name: 'Массажёр для шеи', price: 4500, category: 'Техника', image: '💆', tags: ['техника'] },
        { id: 4, name: 'Портативная колонка', price: 2800, category: 'Техника', image: '🔊', tags: ['техника'] },
        { id: 5, name: 'Бестселлер "Сила привычки"', price: 800, category: 'Книги', image: '📚', tags: ['книги'] },
        { id: 6, name: 'Набор свечей', price: 1700, category: 'Красота', image: '🕯️', tags: ['красота'] },
        { id: 7, name: 'Умное кольцо', price: 8900, category: 'Техника', image: '💍', tags: ['техника'] },
        { id: 8, name: 'Набор для каллиграфии', price: 2100, category: 'Хобби', image: '✒️', tags: ['хобби'] },
        { id: 9, name: 'Подписка на кино', price: 2500, category: 'Развлечения', image: '🎬', tags: ['развлечения'] },
        { id: 10, name: 'Игра "Мафия"', price: 1500, category: 'Игры', image: '🎲', tags: ['игры'] },
        { id: 11, name: 'Кофеварка', price: 5500, category: 'Техника', image: '☕', tags: ['техника'] },
        { id: 12, name: 'Карта звездного неба', price: 2900, category: 'Декор', image: '✨', tags: ['декор'] }
    ];

    // ==================== ВОПРОСЫ ====================
    const questions = [
        { text: 'Кому ищем подарок?', options: ['👩 Женщине', '👨 Мужчине'] },
        { text: 'Какое увлечение?', options: ['⚽ Спорт', '💻 Технологии', '📚 Книги'] },
        { text: 'Какой бюджет?', options: ['💰 до 2000₽', '💰💰 2000-5000₽', '💰💰💰 5000+₽'] }
    ];

    // ==================== СОСТОЯНИЕ ====================
    let currentUser = JSON.parse(localStorage.getItem('giftguru_user')) || { name: 'Гость', email: 'client@mail.ru' };
    let answers = [null, null, null];
    let currentQuestion = 0;
    let cart = JSON.parse(localStorage.getItem('giftguru_cart')) || [];
    let recommendedProducts = [...products];

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    document.addEventListener('DOMContentLoaded', () => {
        updateUserBadge();
        renderQuiz();
        renderProducts(recommendedProducts);
        updateCartUI();
    });

    // ==================== ТЕСТ ====================
    function renderQuiz() {
        if (currentQuestion >= questions.length) {
            document.getElementById('quizContainer').innerHTML = '<div class="quiz-question">✅ Тест пройден!</div>';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('prevBtn').style.display = 'none';
            applyRecommendations();
            return;
        }
        const q = questions[currentQuestion];
        let html = `<div class="quiz-question">${q.text}</div><div class="quiz-options">`;
        q.options.forEach(opt => {
            const selected = answers[currentQuestion] === opt ? 'selected' : '';
            html += `<div class="quiz-option ${selected}" onclick="selectAnswer('${opt}')">${opt}</div>`;
        });
        html += '</div>';
        document.getElementById('quizContainer').innerHTML = html;
        document.getElementById('quizProgress').style.width = ((currentQuestion) / questions.length) * 100 + '%';
        document.getElementById('prevBtn').style.display = currentQuestion > 0 ? 'inline-block' : 'none';
        document.getElementById('nextBtn').innerText = currentQuestion === questions.length - 1 ? 'Показать подарки' : 'Далее';
    }

    window.selectAnswer = (answer) => {
        answers[currentQuestion] = answer;
        renderQuiz();
    };

    window.nextQuestion = () => {
        if (!answers[currentQuestion]) { alert('Выберите вариант'); return; }
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            renderQuiz();
        } else {
            currentQuestion = questions.length;
            renderQuiz();
        }
    };

    window.prevQuestion = () => {
        if (currentQuestion > 0) {
            currentQuestion--;
            renderQuiz();
        }
    };

    function applyRecommendations() {
        let filtered = [...products];
        const lastAnswer = answers[answers.length - 1];
        if (lastAnswer === '💰 до 2000₽') filtered = filtered.filter(p => p.price <= 2000);
        else if (lastAnswer === '💰💰 2000-5000₽') filtered = filtered.filter(p => p.price > 2000 && p.price <= 5000);
        else if (lastAnswer === '💰💰💰 5000+₽') filtered = filtered.filter(p => p.price > 5000);
        recommendedProducts = filtered.length ? filtered : products;
        renderProducts(recommendedProducts);
    }

    // ==================== КАТАЛОГ ====================
    function renderProducts(productsToRender) {
        let html = '';
        productsToRender.forEach(p => {
            html += `
                <div class="product-card">
                    <div class="product-image">${p.image}</div>
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">${p.price} ₽</div>
                    <button class="btn-add" onclick="addToCart(${p.id})">В корзину</button>
                </div>
            `;
        });
        document.getElementById('productsGrid').innerHTML = html;
    }

    window.filterProducts = (filter) => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        let filtered = [...recommendedProducts];
        if (filter === 'до 2000') filtered = filtered.filter(p => p.price <= 2000);
        else if (filter === '2000-5000') filtered = filtered.filter(p => p.price > 2000 && p.price <= 5000);
        else if (filter === '5000+') filtered = filtered.filter(p => p.price > 5000);
        renderProducts(filtered);
    };

    // ==================== КОРЗИНА ====================
    window.addToCart = (id) => {
        cart.push(products.find(p => p.id === id));
        localStorage.setItem('giftguru_cart', JSON.stringify(cart));
        updateCartUI();
        alert('Товар в корзине');
    };

    window.removeFromCart = (index) => {
        cart.splice(index, 1);
        localStorage.setItem('giftguru_cart', JSON.stringify(cart));
        updateCartUI();
    };

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        let html = '', total = 0;
        cart.forEach((item, i) => {
            total += item.price;
            html += `
                <div class="cart-item">
                    <div class="cart-item-image">${item.image}</div>
                    <div class="cart-item-info">
                        <div>${item.name}</div>
                        <div class="cart-item-price">${item.price}₽</div>
                    </div>
                    <div class="cart-item-remove" onclick="removeFromCart(${i})"><i class="fas fa-trash"></i></div>
                </div>`;
        });
        document.getElementById('cartItems').innerHTML = html || '<p>Корзина пуста</p>';
        document.getElementById('cartTotal').innerText = `Итого: ${total}₽`;
    }

    window.toggleCart = () => {
        document.getElementById('cartModal').classList.toggle('open');
        document.getElementById('cartOverlay').classList.toggle('active');
    };

    // ==================== ПОЛЬЗОВАТЕЛЬ ====================
    function updateUserBadge() {
        document.getElementById('userName').innerText = currentUser.name;
    }

    window.showAuthModal = () => {
        document.getElementById('authModal').classList.add('active');
        document.getElementById('authOverlay').classList.add('active');
        document.getElementById('userNameInput').value = currentUser.name;
        document.getElementById('userEmailInput').value = currentUser.email;
    };

    window.hideAuthModal = () => {
        document.getElementById('authModal').classList.remove('active');
        document.getElementById('authOverlay').classList.remove('active');
    };

    window.saveUser = () => {
        currentUser = {
            name: document.getElementById('userNameInput').value || 'Гость',
            email: document.getElementById('userEmailInput').value || 'client@mail.ru'
        };
        localStorage.setItem('giftguru_user', JSON.stringify(currentUser));
        updateUserBadge();
        hideAuthModal();
    };

    // ==================== ОФОРМЛЕНИЕ ЗАКАЗА ====================
    window.checkout = () => {
        if (cart.length === 0) { alert('Корзина пуста'); return; }
        
        // ВАША ПОЧТА - СЮДА ПРИХОДЯТ ЗАКАЗЫ
        const SELLER_EMAIL = 'dominikamangl@gmail.com';
        
        let orderText = `🔔 НОВЫЙ ЗАКАЗ\n\n`;
        orderText += `Клиент: ${currentUser.name}\n`;
        orderText += `Email клиента: ${currentUser.email}\n\n`;
        orderText += `Товары:\n`;
        cart.forEach((item, i) => {
            orderText += `${i+1}. ${item.name} - ${item.price}₽\n`;
        });
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        orderText += `\nИТОГО: ${total}₽\n`;
        
        // Отправляем через mailto - открывает почтовую программу
        window.location.href = `mailto:${SELLER_EMAIL}?subject=${encodeURIComponent('Новый заказ GiftGuru')}&body=${encodeURIComponent(orderText)}`;
        
        // Очищаем корзину
        cart = [];
        localStorage.setItem('giftguru_cart', JSON.stringify(cart));
        updateCartUI();
        toggleCart();
        alert('Заказ отправлен продавцу!');
    };
</script>
</body>
</html>
